services:
  postgres:
    image: postgres:17-alpine
    container_name: lios-clinic-portal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lioscare_production
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - clinic_portal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d lioscare_production"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lioscare-network

  lioscare-app:
    build:
      context: .
      dockerfile: src/LIOSCare.ClinicPortal.Web/Dockerfile
    image: lios-clinic-portal:latest
    container_name: lios-clinic-portal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      AllowedHosts: "*"

      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=lioscare_production;Username=${DB_USER};Password=${DB_PASSWORD};Include Error Detail=false"

      Portal__AutoMigrateOnStartup: "true"
      Portal__SeedDemoData: "true"
    volumes:
      - ./logs:/app/logs
      - clinic_portal_uploads:/app/wwwroot/uploads
    networks:
      - lioscare-network

volumes:
  clinic_portal_pgdata:
  clinic_portal_uploads:

networks:
  lioscare-network:
    driver: bridge